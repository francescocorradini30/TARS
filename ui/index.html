<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tars-panel">
        <div class="logo">T &nbsp; A &nbsp; R &nbsp; S</div>

        <div class="tars-body" id="tarsBody">
            <div class="segment">
                <div class="panel-line"></div>
                <div class="panel-line"></div>
                <div class="panel-line short"></div>
            </div>
            <div class="core">
                <div class="waveform" id="waveform"></div>
                <div class="eye" id="eye"></div>
            </div>
            <div class="segment">
                <div class="panel-line short"></div>
                <div class="panel-line"></div>
                <div class="panel-line"></div>
            </div>
        </div>

        <div class="status-text" id="statusText">STANDBY</div>

        <div class="readout">
            <div>HUMOR &nbsp;<span class="fill">████████████░░░░</span> 75%</div>
            <div>HONESTY <span class="fill">██████████████░</span> 90%</div>
        </div>

        <button class="reset-btn" id="resetBtn">RESET MEMORY</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
