<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TARS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">

        <!-- Left: TARS visualization -->
        <div class="tars-panel">
            <div class="logo">T &nbsp; A &nbsp; R &nbsp; S</div>

            <div class="tars-body" id="tarsBody">
                <div class="segment">
                    <div class="panel-line"></div>
                    <div class="panel-line"></div>
                    <div class="panel-line short"></div>
                </div>
                <div class="core">
                    <div class="waveform" id="waveform"></div>
                    <div class="eye" id="eye"></div>
                </div>
                <div class="segment">
                    <div class="panel-line short"></div>
                    <div class="panel-line"></div>
                    <div class="panel-line"></div>
                </div>
            </div>

            <div class="status-text" id="statusText">STANDBY</div>

            <div class="readout">
                <div>HUMOR &nbsp;<span class="fill">████████████░░░░</span> 75%</div>
                <div>HONESTY <span class="fill">██████████████░</span> 90%</div>
            </div>

            <button class="reset-btn" id="resetBtn">RESET MEMORY</button>
        </div>

        <!-- Right: Chat -->
        <div class="chat-panel">
            <div class="chat-log" id="chatLog">
                <div class="message tars">
                    <div class="sender">TARS</div>
                    <div class="content">Online. Standing by.</div>
                </div>
            </div>

            <div class="input-row">
                <button class="mic-btn" id="micBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                    <span>HOLD TO SPEAK</span>
                </button>
                <input type="text" id="textInput" placeholder="or type here..." autocomplete="off" spellcheck="false">
                <button id="sendBtn">SEND</button>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
